<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test Turnstile</title>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
body{
    background:#0d1117;
    color:#fff;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:#161b22;
    padding:30px;
    border-radius:20px;
    width:350px;
    text-align:center;
}
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#238636;
    color:#fff;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="box">

<h2>Turnstile Test</h2>

<form id="form">

<div
    class="cf-turnstile"
    data-sitekey="YOUR_SITE_KEY">
</div>

<button type="submit">
XÁC THỰC
</button>

</form>

<p id="msg"></p>

</div>

<script>
document.getElementById("form").addEventListener("submit", async (e)=>{

    e.preventDefault();

    const token = document.querySelector('[name="cf-turnstile-response"]').value;

    if(!token){
        alert("Chưa xác thực");
        return;
    }

    const res = await fetch("/api/verify",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            token
        })
    });

    const data = await res.json();

    document.getElementById("msg").innerText =
        JSON.stringify(data,null,2);

});
</script>

</body>
</html>
